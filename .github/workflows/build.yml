name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up npm
        run: npm install --global npm@11.18.0

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      # RustEmbed が out/ を必要とするため、Rust検査より先に実行します
      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-check-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-check-cargo-

      - name: Rust tests
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: Build ${{ matrix.artifact }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: kataru-windows-x64
            archive: kataru-windows-x64.zip

          - os: ubuntu-latest
            artifact: kataru-linux-x64
            archive: kataru-linux-x64.tar.gz

          # 現在の macos-latest はArm64です
          - os: macos-latest
            artifact: kataru-macos-arm64
            archive: kataru-macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up npm
        run: npm install --global npm@11.18.0

      - name: Install npm dependencies
        run: npm ci

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-release-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-release-cargo-

      - name: Build frontend
        run: npm run build

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test
        run: npm run smoke:binary

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -LiteralPath target/release/kataru.exe `
            -DestinationPath "${{ matrix.archive }}"

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -czf "${{ matrix.archive }}" -C target/release kataru

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 14
